<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title }} | {% endif %}Mensur</title>
  <meta name="description" content="Mensur | A Weissmann–Greiffenberg Institute Project. Lineage, nobility, aristocratic memory, genealogy, symbolism, Mesmerism, Western esotericism and European intellectual history.">

  <link rel="canonical" href="{{ site.url }}{{ page.url }}">



  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/google-favicon.png">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">

  <link rel="stylesheet" href="/assets/css/style.css?v=layout-clean-final-v1">
  <link rel="stylesheet" href="/assets/css/home-clean-v2.css?v=favicon-google-v1">
</head>

<body class="{% if page.url == '/' %}home-page{% else %}inner-page{% endif %}">
  <header class="topbar">
    <a class="brand" href="/">
      <img class="brand-logo" src="/assets/images/mensur-shield-header.png?v=layout-clean-final-v1" alt="Mensur shield">
      <span>Mensur<sup class="brand-symbol">™</sup></span>
    </a>

    <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
      <span aria-hidden="true">☰</span>
    </button>

    <nav class="nav" aria-label="Main navigation">
      <a href="/">Home</a>
      <a href="/project/">Project</a>
      <a href="/research-lines/">Research</a>
      <a href="/articles/">Articles</a>
      <a href="/notes/">Notes</a>
      <a href="/archive/">Archive</a>
      <a href="/bibliography/">Bibliography</a>
      <a href="/about/">About</a>
      <a href="/contact/">Contact</a>
      <a class="nav-search-link" href="/search/" aria-label="Search Mensur">
        <span>Search</span>
        <span class="nav-search-icon" aria-hidden="true"></span>
      </a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-brand">MENSUR<span class="footer-symbol">™</span> | A WEISSMANN–GREIFFENBERG INSTITUTE PROJECT</div>
    <nav class="footer-links" aria-label="Footer navigation">
      <a href="/contact/">Contact</a>
      <a href="/privacy/">Privacy Notice</a>
      <a href="/legal/">Legal Notice</a>
    </nav>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const toggle = document.querySelector(".nav-toggle");
      const nav = document.querySelector(".nav");

      if (!toggle || !nav) return;

      toggle.addEventListener("click", function () {
        const open = nav.classList.toggle("open");
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
      });

      nav.querySelectorAll("a").forEach(function (link) {
        link.addEventListener("click", function () {
          nav.classList.remove("open");
          toggle.setAttribute("aria-expanded", "false");
        });
      });
    });
  </script>

  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "33e9dc89a39f4ee18a7f0d5e76886ee8"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>

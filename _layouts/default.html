<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
  <title>{% if page.title %}{{ page.title }} | {% endif %}Mensur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="/assets/css/style.css?v=fixed-shield-transparent-bar-1">


  <link rel="icon" type="image/png" href="/favicon.png?v=fixed-shield-1">
  <link rel="shortcut icon" href="/favicon.ico?v=fixed-shield-1">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png?v=fixed-shield-1">

</head>
<body class="{% if page.url == '/' %}home-page{% else %}inner-page{% endif %}">

</a>
    <button class="nav-toggle" id="navToggle">Menu</button>
    <nav class="nav" id="siteNav">
      <a href="/">Home</a>
      <a href="/project/">Project</a>
      <a href="/research-lines/">Research</a>
      <a href="/articles/">Articles</a>
      <a href="/notes/">Notes</a>
      <a href="/archive/">Archive</a>
      <a href="/bibliography/">Bibliography</a>
      <a href="/about/">About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="footer">

  </footer>

  <script src="/assets/js/main.js"></script>

</html>
